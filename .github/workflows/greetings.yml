name: Saudações

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Olá! Obrigado por abrir sua primeira issue neste repositório. Fique à vontade para compartilhar detalhes e sugestões. Nossa equipe irá analisar e responder em breve!"
        pr-message: "Olá! Obrigado por enviar seu primeiro pull request para este repositório. Sua contribuição é muito importante para nós. Nossa equipe irá revisar e dar um retorno em breve!"
    - name: Adicionar rótulo de saudação
      run: |
        gh pr edit ${{ github.event.pull_request.number }} --add-label "greeting"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}